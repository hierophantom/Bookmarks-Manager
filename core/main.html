<body>
  <div id="bmg-dim-layer" aria-hidden="true"></div>

  <!-- Main content wrapper -->
  <div id="bmg-main-content">
      <!-- Hidden autofocus input for focus workaround -->
      <input id="bmg-focus-hack" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;" tabindex="0" autofocus />
    <!-- Top Bar with general settings -->
    <header class="topbar">
      <div class="topbar__left">
        <button id="personalize-btn" class="topbar__action-btn" type="button" aria-label="Personalize Your Experience" style="min-width: 32px; min-height: 32px;">
          <span class="material-symbols-outlined" aria-hidden="true">apps</span>
        </button>
        <div id="header-inspiration" class="topbar__inspiration" aria-live="polite">
          <span id="header-quote-text" class="topbar__quote-text"></span>
          <span class="topbar__quote-sep">-</span>
          <a id="header-quote-author" class="topbar__quote-author" href="#" target="_blank" rel="noopener noreferrer"></a>
        </div>
      </div>
      <button id="open-search" class="topbar__search" title="Search (Cmd+Shift+E)" type="button">
        <span class="material-symbols-outlined topbar__search-icon" aria-hidden="true">search</span>
        <span class="topbar__search-text topbar__search-text--idle">Search</span>
        <span class="topbar__search-text topbar__search-text--hover">Search</span>
        <span class="topbar__shortcut" aria-hidden="true">
          <span class="topbar__shortcut-key">⌘</span>
          <span class="topbar__shortcut-key">⇧</span>
          <span class="topbar__shortcut-key">E</span>
        </span>
      </button>
      <div class="topbar__actions">
        <button id="unsplash-attribution-btn" class="topbar__icon-btn" type="button" aria-label="Photo attribution" style="display: none;">
          <span class="material-symbols-outlined" aria-hidden="true">landscape</span>
        </button>
        <button class="topbar__icon-btn" type="button" aria-label="Header action" style="display: none;">
          <span class="material-symbols-outlined" aria-hidden="true">import_contacts</span>
        </button>
        <div class="topbar__menu-shell">
          <button id="app-menu-btn" class="topbar__icon-btn" type="button" aria-label="Info menu" aria-haspopup="menu" aria-expanded="false">
            <span class="material-symbols-outlined" aria-hidden="true">info</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Make Default New Tab Banner (hidden by default) -->
    <div id="make-default-banner" class="banner" style="display: none;">
      <div class="banner__title">✨ Make this your default new tab page</div>
      <div class="banner__subtitle">See your bookmarks every time you open a new tab</div>
      <button id="make-default-btn" class="banner__button">Make Default New Tab Page</button>
    </div>

    <!-- Page Container -->
    <div id="page-container">
      <!-- Page 1: Homepage / Widgets -->
      <section class="page homepage-page" data-page="0">
        <div class="homepage-content">
          <div id="widgets-container"></div>
        </div>
      </section>

      <!-- Page 2: Bookmarks -->
      <section class="page bookmarks-page" data-page="1">
        <div class="bookmarks-page__content">
          <div class="bookmarks-actions" id="bookmarks-actions">
            <div class="bookmarks-actions__left" id="bookmarks-actions-left"></div>
            <div class="bookmarks-actions__divider" aria-hidden="true"></div>
            <div class="bookmarks-actions__settings" id="bookmarks-actions-settings"></div>
            <div class="bookmarks-actions__spacer"></div>
            <div class="bookmarks-actions__right" id="bookmarks-actions-right"></div>
          </div>
          <section class="tab-groups-section" id="tab-groups-section" style="display: none;">
            <h3 class="subheading">Tab Groups</h3>
            <div id="tab-groups-container"></div>
          </section>
          <div class="bookmarks-sections" id="bookmarks-root"></div>
          <div class="bookmarks-floating-actions">
            <div id="bookmarks-floating-left"></div>
            <div id="bookmarks-floating-right"></div>
          </div>
        </div>
      </section>

      <!-- Page 3: Journey -->
      <section class="page journey-page" data-page="2">
        <div class="journey-page__content">
          <div class="journey-page__toolbar">
            <div id="journey-timeframes" class="journey-page__timeframes"></div>
            <div id="journey-filters" class="journey-page__filters"></div>
            <div id="journey-toolbar-settings" class="journey-page__toolbar-settings"></div>
          </div>

          <div class="journey-page__layout">
            <aside class="journey-page__origins" aria-label="Journeys">
              <h2 class="journey-page__origins-title">Journeys (0)</h2>
              <div id="journey-origin-search" class="journey-page__origin-search"></div>
              <div id="journey-origin-list" class="journey-page__origin-list"></div>
            </aside>

            <section class="journey-page__canvas" aria-label="Journey map">
              <div id="journey-actions" class="journey-page__actions"></div>
              <div id="journey-canvas-surface" class="journey-page__canvas-surface">
                <div id="journey-panzoom" class="journey-page__panzoom">
                  <div id="journey-map-stage" class="journey-page__map-stage">
                    <div id="journey-connectors" class="journey-page__connectors" aria-hidden="true"></div>
                    <div id="journey-node-map" class="journey-page__node-map"></div>
                  </div>
                </div>
              </div>
              <div id="journey-canvas-controls" class="journey-page__canvas-controls" aria-label="Canvas controls"></div>
              <div class="journey-page__legend" aria-label="Journey legend">
                <div class="journey-page__legend-item">
                  <span class="journey-page__legend-swatch journey-page__legend-swatch--origin" aria-hidden="true"></span>
                  <span class="journey-page__legend-label">Origin</span>
                </div>
                <div class="journey-page__legend-item">
                  <span class="journey-page__legend-swatch journey-page__legend-swatch--branch" aria-hidden="true"></span>
                  <span class="journey-page__legend-label">Branch</span>
                </div>
                <div class="journey-page__legend-item">
                  <span class="journey-page__legend-swatch journey-page__legend-swatch--end-point" aria-hidden="true"></span>
                  <span class="journey-page__legend-label">End point</span>
                </div>
              </div>
              <div id="journey-more-menu" class="journey-page__more-menu" hidden>
                <button id="journey-open-all-nodes" class="journey-page__more-menu-item" type="button">Open all nodes</button>
                <button id="journey-save-bookmarks" class="journey-page__more-menu-item" type="button">Save all to bookmarks</button>
                <button id="journey-delete-branches" class="journey-page__more-menu-item" type="button">
                  <span class="journey-page__more-menu-item-icon material-symbols-outlined" aria-hidden="true">delete</span>
                  <span>Delete all branches</span>
                </button>
              </div>
            </section>
          </div>
        </div>
      </section>
    </div>

    <!-- Side Panels (mounted outside page content) -->
    <div id="bmg-left-panel">
      <div id="bmg-left-panel-content"></div>
    </div>
    <div id="bmg-right-panel"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav c-nav">
      <button class="c-nav__btn" data-target="0">
        <span class="c-nav__icon material-symbols-outlined" aria-hidden="true">home</span>
        <span class="c-nav__label">Home</span>
      </button>
      <button class="c-nav__btn" data-target="1">
        <span class="c-nav__icon material-symbols-outlined" aria-hidden="true">bookmark</span>
        <span class="c-nav__label">Bookmarks</span>
      </button>
      <button class="c-nav__btn" data-target="2">
        <span class="c-nav__icon material-symbols-outlined" aria-hidden="true">conversion_path</span>
        <span class="c-nav__label">Journey</span>
      </button>
    </nav>
  </div>
  </div>
